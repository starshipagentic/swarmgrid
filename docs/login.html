<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — SwarmGrid</title>
  <style>
    :root {
      --bg: #0c1116;
      --panel: #1a2128;
      --text: #e7edf3;
      --muted: #9fb2c7;
      --accent: #9fd3c7;
      --green: #7fe08a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--panel);
      border: 2px solid #334150;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .login-card .logo {
      font-family: Menlo, Monaco, Consolas, monospace;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .login-card .subtitle {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 36px;
    }
    .github-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      background: var(--text);
      color: var(--bg);
      transition: opacity 0.2s;
      margin-bottom: 24px;
    }
    .github-btn:hover { opacity: 0.85; }
    .github-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
    .login-links {
      display: flex;
      gap: 20px;
      justify-content: center;
    }
    .login-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    .login-links a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <script>
    // Auto-redirect if already logged in
    (function() {
      const token = document.cookie.split(';').find(c => c.trim().startsWith('sg_token='));
      if (token) { window.location.href = 'dashboard.html'; }
    })();
  </script>

  <div class="login-card">
    <div class="logo">SwarmGrid</div>
    <div class="subtitle">Sign in to configure your agent swarm</div>
    <a href="https://swarmgrid-api.fly.dev/auth/login" class="github-btn">
      <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
      Sign in with GitHub
    </a>
    <div class="login-links">
      <a href="/">Home</a>
      <a href="https://github.com/starshipagentic/swarmgrid">GitHub</a>
    </div>
  </div>

</body>
</html>
